<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1a0011 0%, #2d0018 30%, #3d0022 60%, #1a0011 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* ---- hearts container ---- */
  #heart-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }

  .heart {
    position: absolute;
    width: 24px;
    height: 24px;
    opacity: 0;
    animation: floatHeart var(--dur) ease-out forwards;
    animation-delay: var(--delay);
  }

  .heart::before,
  .heart::after {
    content: '';
    position: absolute;
    width: 14px;
    height: 22px;
    background: var(--c);
    border-radius: 14px 14px 0 0;
  }
  .heart::before {
    left: 10px;
    transform: rotate(-45deg);
    transform-origin: 0 100%;
  }
  .heart::after {
    left: 0;
    transform: rotate(45deg);
    transform-origin: 100% 100%;
  }

  @keyframes floatHeart {
    0% {
      opacity: 0;
      transform: translateY(0) scale(0.3) rotate(0deg);
    }
    10% {
      opacity: 1;
      transform: translateY(-30px) scale(1) rotate(8deg);
    }
    100% {
      opacity: 0.4;
      transform: translateY(calc(-1 * var(--rise))) scale(0.9) rotate(360deg);
    }
  }

  /* ---- smaller debris hearts ---- */
  .debris {
    position: absolute;
    font-size: 10px;
    opacity: 0;
    animation: debrisFly var(--ddur) ease-out forwards;
    animation-delay: var(--ddelay);
    pointer-events: none;
  }
  @keyframes debrisFly {
    0%   { opacity: 0; transform: translate(0,0) scale(0.4) rotate(0deg); }
    20%  { opacity: 0.8; transform: translate(var(--dx), var(--dy)) scale(1) rotate(60deg); }
    100% { opacity: 0; transform: translate(calc(var(--dx)*1.8), calc(var(--dy)*1.8)) scale(0.2) rotate(240deg); }
  }

  /* ---- text layers ---- */
  .text-layer {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
    pointer-events: none;
  }

  #msg1 {
    font-size: clamp(2.4rem, 8vw, 5rem);
    color: #ffb6d9;
    text-shadow:
      0 0 20px rgba(255, 105, 180, 0.6),
      0 0 60px rgba(255, 105, 180, 0.3),
      0 0 100px rgba(255, 105, 180, 0.15);
    opacity: 0;
    transform: scale(0.6);
    transition: opacity 1.2s ease, transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    letter-spacing: 6px;
    font-weight: 700;
  }
  #msg1.show {
    opacity: 1;
    transform: scale(1);
  }
  #msg1.hide {
    opacity: 0;
    transform: scale(1.4);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  #msg2 {
    font-size: clamp(1.8rem, 6vw, 3.6rem);
    color: #ffd700;
    text-shadow:
      0 0 20px rgba(255, 215, 0, 0.5),
      0 0 60px rgba(255, 215, 0, 0.25);
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 1.2s ease 0.3s, transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s;
    letter-spacing: 4px;
    font-weight: 600;
  }
  #msg2.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* ---- shimmer overlay ---- */
  #shimmer {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(255,105,180,0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(255,182,217,0.06) 0%, transparent 50%);
    pointer-events: none;
  }

  /* falling sparkles */
  .sparkle {
    position: fixed;
    width: 4px;
    height: 4px;
    background: #fff;
    border-radius: 50%;
    opacity: 0;
    z-index: 0;
    pointer-events: none;
    animation: sparkleFall var(--sdur) linear infinite;
    animation-delay: var(--sdelay);
  }
  @keyframes sparkleFall {
    0%   { opacity: 0; transform: translateY(-10px) scale(0); }
    20%  { opacity: 0.7; transform: translateY(20vh) scale(1); }
    100% { opacity: 0; transform: translateY(100vh) scale(0); }
  }
</style>
</head>
<body>

<div id="shimmer"></div>

<div id="heart-container"></div>

<div class="text-layer">
  <div id="msg1">对不起我爱你</div>
</div>

<div class="text-layer">
  <div id="msg2">明天考试加油 💪</div>
</div>

<script>
(function() {
  const COLORS = [
    '#ff6b9d', '#ff8eb5', '#ffb6d9', '#ff4d7a',
    '#e8436e', '#ff9eb5', '#ff7fa3', '#ff3b6f',
  ];
  const EMOJIS = ['❤️', '💗', '💖', '💕', '♥️'];

  const container = document.getElementById('heart-container');

  /* ---- spawn main hearts ---- */
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'heart';
    el.style.left = Math.random() * 100 + '%';
    el.style.top = (50 + Math.random() * 50) + '%';
    el.style.setProperty('--c', COLORS[Math.floor(Math.random() * COLORS.length)]);
    el.style.setProperty('--dur', (2.4 + Math.random() * 2.0) + 's');
    el.style.setProperty('--delay', (Math.random() * 0.8) + 's');
    el.style.setProperty('--rise', (300 + Math.random() * 500) + 'px');
    container.appendChild(el);
  }

  /* ---- spawn debris hearts ---- */
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'debris';
    el.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
    el.style.left = Math.random() * 100 + '%';
    el.style.top = (40 + Math.random() * 50) + '%';
    el.style.setProperty('--dx', (-120 + Math.random() * 240) + 'px');
    el.style.setProperty('--dy', (-200 - Math.random() * 200) + 'px');
    el.style.setProperty('--ddur', (1.5 + Math.random() * 1.5) + 's');
    el.style.setProperty('--ddelay', (0.4 + Math.random() * 0.6) + 's');
    container.appendChild(el);
  }

  /* ---- sparkles ---- */
  const body = document.body;
  for (let i = 0; i < 20; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.style.left = Math.random() * 100 + '%';
    s.style.setProperty('--sdur', (5 + Math.random() * 8) + 's');
    s.style.setProperty('--sdelay', (Math.random() * 6) + 's');
    body.appendChild(s);
  }

  /* ---- text sequence ---- */
  const msg1 = document.getElementById('msg1');
  const msg2 = document.getElementById('msg2');

  // hearts start immediately, show msg1 after 2.8s
  setTimeout(() => {
    msg1.classList.add('show');
  }, 2800);

  // hide msg1, show msg2 after 5.8s
  setTimeout(() => {
    msg1.classList.remove('show');
    msg1.classList.add('hide');
  }, 5800);

  setTimeout(() => {
    msg1.style.display = 'none';
    msg2.classList.add('show');
  }, 6600);
})();
</script>

</body>
</html>
